name: Test Suite
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Install typst
        run: |
          gh release download --repo typst/typst --pattern 'typst-x86_64-unknown-linux-musl.tar.xz'
          tar xJf typst-x86_64-unknown-linux-musl.tar.xz --strip-components=1
          sudo mv typst /usr/local/bin/
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all --tests -- -D warnings
      - name: Test
        run: cargo nextest run --all -- --test-threads=2
      - name: Release build
        run: cargo build --release
